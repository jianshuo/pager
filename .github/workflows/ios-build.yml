name: iOS Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:
    inputs:
      destination:
        description: 'Where to ship'
        required: true
        default: 'testflight'
        type: choice
        options:
          - testflight   # build + upload to TestFlight (same as a push to main)
          - appstore     # submit the build already on TestFlight to App Store review
          - certs        # one-shot: run match refresh_profiles (create/sync signing profiles)

# Serialize builds: two parallel runs would collide on the same build number.
concurrency:
  group: ios-build
  cancel-in-progress: false

defaults:
  run:
    working-directory: ios

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      # Pager uses XcodeGen — the .xcodeproj is gitignored; regenerate first.
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # PRs: build only (verify it compiles, no signing)
      - name: Build for verification
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild build \
            -project Pager.xcodeproj \
            -scheme Pager \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      # Push to main → TestFlight. Manual "appstore" dispatch → submit for review.
      - name: Run fastlane
        if: github.event_name != 'pull_request'
        env:
          MATCH_PASSWORD:       ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTH: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
          ASC_API_KEY_ID:       ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID:    ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_CONTENT:  ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          if [ "${{ github.event.inputs.destination }}" = "certs" ]; then
            bundle exec fastlane refresh_profiles
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.destination }}" = "appstore" ]; then
            bundle exec fastlane release skip_build:true
          else
            bundle exec fastlane beta
          fi

      - name: Push tags
        if: success() && github.event_name != 'pull_request'
        run: git push --tags || true
