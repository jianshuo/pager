name: Pager
options:
  bundleIdPrefix: com.wangjianshuo
  deploymentTarget:
    iOS: "18.0"
targets:
  Pager:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PagerApp
    info:
      path: PagerApp/Info.plist
      properties:
        CFBundleDisplayName: Pager
        # 只用 HTTPS/WSS 标准加密，无自研加密 → 自动通过出口合规，免 TestFlight「缺少合规」拦截
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLName: com.wangjianshuo.Pager
            CFBundleURLSchemes:
              - pager
    entitlements:
      path: PagerApp/Pager.entitlements
      properties:
        aps-environment: production
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjianshuo.Pager
        DEVELOPMENT_TEAM: 97XBW2A43H
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.wangjianshuo.Pager"
  PagerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PagerTests
    dependencies:
      - target: Pager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjianshuo.Pager.Tests
        DEVELOPMENT_TEAM: 97XBW2A43H
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  Pager:
    build:
      targets:
        Pager: all
        PagerTests: [test]
    test:
      targets:
        - PagerTests
